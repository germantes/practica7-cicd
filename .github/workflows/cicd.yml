name: CI/CD Hospital App

on:
  push:
    branches:
      - main # O el nombre de tu rama principal

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y empujar imagen Docker
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hospital-app:latest

  deploy-to-k8s:
    needs: build-and-push
    runs-on: self-hosted # ¡Importante! Usa tu runner local
    steps:
      - name: Actualizar imagen en Kubernetes
        run: |
          kubectl rollout restart deployment hospital-app-deployment
